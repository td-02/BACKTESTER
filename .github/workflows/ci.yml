name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -U pip && python -m pip install -e .[dev]

      - name: Test
        run: python -m pytest

      - name: Benchmark Smoke
        run: python benchmarks/benchmark_engine.py --max-seconds 0.50 --min-fills 1000
