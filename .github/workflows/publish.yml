name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nanoback

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build instrumented extension (PGO generate)
        run: |
          python -m pip install -e .
        env:
          CMAKE_ARGS: -DNANOBACK_PGO_MODE=GENERATE

      - name: Collect profile data
        run: python benchmarks/benchmark_engine.py --max-seconds 1.0 --min-fills 1000 --ci-mode

      - name: Build distribution (PGO use)
        run: python -m build --sdist --wheel --outdir dist
        env:
          CMAKE_ARGS: -DNANOBACK_PGO_MODE=USE

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
