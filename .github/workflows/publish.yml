name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nanoback

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build instrumented extension (PGO generate)
        run: |
          python -m pip install -e .
        env:
          CMAKE_ARGS: -DNANOBACK_PGO_MODE=GENERATE

      - name: Collect profile data
        continue-on-error: true
        run: python benchmarks/benchmark_engine.py --max-seconds 5.0 --min-fills 1

      - name: Build distribution (PGO use with fallback)
        run: |
          export CMAKE_ARGS="-DNANOBACK_PGO_MODE=USE"
          python -m build --sdist --wheel --outdir dist || {
            echo "PGO build failed, falling back to standard release build"
            unset CMAKE_ARGS
            python -m build --sdist --wheel --outdir dist
          }

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
